<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- GS Ball: Pokéball split gold/silver with a G and S -->
  <rect width="32" height="32" rx="8" fill="#0f1117"/>
  <!-- Top half gold -->
  <path d="M4 16 A12 12 0 0 1 28 16 Z" fill="#c9a227"/>
  <!-- Bottom half silver -->
  <path d="M4 16 A12 12 0 0 0 28 16 Z" fill="#a8a8b8"/>
  <!-- Center band -->
  <rect x="4" y="14.5" width="24" height="3" fill="#1a1c24"/>
  <!-- Center button -->
  <circle cx="16" cy="16" r="4" fill="#1a1c24"/>
  <circle cx="16" cy="16" r="2.5" fill="#c9a227"/>
  <!-- G left, S right in center circle -->
  <text x="14.5" y="17.5" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="4.5" fill="#0f1117" text-anchor="middle">G</text>
  <text x="17.5" y="17.5" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="4.5" fill="#0f1117" text-anchor="middle">S</text>
</svg>
