<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Suicune wave motif: flowing water wave + S -->
  <rect width="32" height="32" rx="8" fill="#0a1520"/>
  <!-- Wave layers -->
  <path d="M0 22 Q8 16 16 20 Q24 24 32 18 L32 32 L0 32 Z" fill="#0d2b45"/>
  <path d="M0 24 Q8 19 16 22 Q24 26 32 21 L32 32 L0 32 Z" fill="#1a4060"/>
  <path d="M0 27 Q8 22 16 25 Q24 28 32 24 L32 32 L0 32 Z" fill="#a8d4e8" opacity="0.3"/>
  <!-- S letter in accent blue -->
  <text x="16" y="19" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="20" fill="#a8d4e8" text-anchor="middle">S</text>
  <!-- Small GS under -->
  <text x="16" y="30" font-family="Arial, sans-serif" font-weight="700" font-size="5" fill="#a8d4e8" text-anchor="middle" opacity="0.7">GS</text>
</svg>
