<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Diamond / gem shape in Suicune blue, with S inside -->
  <rect width="32" height="32" rx="8" fill="#0f1117"/>
  <!-- Diamond shape -->
  <polygon points="16,3 29,16 16,29 3,16" fill="#1a3a52"/>
  <polygon points="16,3 29,16 16,29 3,16" fill="none" stroke="#a8d4e8" stroke-width="1.5"/>
  <!-- Inner lighter diamond -->
  <polygon points="16,8 24,16 16,24 8,16" fill="#0d2333"/>
  <!-- S letter -->
  <text x="16" y="21" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="16" fill="#a8d4e8" text-anchor="middle">S</text>
</svg>
