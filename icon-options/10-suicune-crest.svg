  <!-- Shield -->
  <path d="M16 3 L27 7 L27 18 Q27 26 16 30 Q5 26 5 18 L5 7 Z" fill="#0d2035"/>
  <path d="M16 3 L27 7 L27 18 Q27 26 16 30 Q5 26 5 18 L5 7 Z" fill="none" stroke="#a8d4e8" stroke-width="1.2"/>
