<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Pokéball with gold top, silver bottom, GS in center button -->
  <rect width="32" height="32" rx="8" fill="#0f1117"/>
  <!-- Gold top -->
  <path d="M4.5 16 A11.5 11.5 0 0 1 27.5 16 Z" fill="#c9a227"/>
  <!-- Silver bottom -->
  <path d="M4.5 16 A11.5 11.5 0 0 0 27.5 16 Z" fill="#9898b0"/>
  <!-- Outline circle -->
  <circle cx="16" cy="16" r="11.5" fill="none" stroke="#2a2d3a" stroke-width="1"/>
  <!-- Band -->
  <rect x="4.5" y="14.7" width="23" height="2.6" fill="#0f1117"/>
  <!-- Button -->
  <circle cx="16" cy="16" r="4.2" fill="#0f1117"/>
  <circle cx="16" cy="16" r="3" fill="#1a1c2a"/>
  <circle cx="16" cy="16" r="2" fill="#0f1117" stroke="#c9a227" stroke-width="0.6"/>
  <!-- GS tiny in button -->
  <text x="15" y="17.2" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="3.5" fill="#c9a227" text-anchor="middle">G</text>
  <text x="17" y="17.2" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="3.5" fill="#a8d4e8" text-anchor="middle">S</text>
</svg>
