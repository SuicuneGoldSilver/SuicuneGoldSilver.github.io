<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Diagonal split: gold top-left, silver bottom-right -->
  <rect width="32" height="32" rx="8" fill="#0f1117"/>
  <clipPath id="clip05">
    <rect width="32" height="32" rx="8"/>
  </clipPath>
  <g clip-path="url(#clip05)">
    <polygon points="0,0 32,0 0,32" fill="#1e1a08"/>
    <polygon points="32,0 32,32 0,32" fill="#111520"/>
    <!-- Diagonal line -->
    <line x1="0" y1="0" x2="32" y2="32" stroke="#c9a227" stroke-width="0.8" opacity="0.6"/>
    <!-- G top-left in gold -->
    <text x="10" y="15" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="14" fill="#c9a227" text-anchor="middle">G</text>
    <!-- S bottom-right in silver/blue -->
    <text x="22" y="28" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="14" fill="#a8a8c0" text-anchor="middle">S</text>
  </g>
</svg>
