<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- GS Ball more detailed: outer ring, proper coloring -->
  <rect width="32" height="32" rx="8" fill="#0f1117"/>
  <!-- Outer circle dark ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#2a2d3a" stroke-width="1"/>
  <!-- Top half: gold with shine -->
  <path d="M3 16 A13 13 0 0 1 29 16 Z" fill="#b8891a"/>
  <path d="M5 13 A11 11 0 0 1 21 8 Q16 6 11 8 Z" fill="#e8c050" opacity="0.5"/>
  <!-- Bottom half: silver -->
  <path d="M3 16 A13 13 0 0 0 29 16 Z" fill="#8888a0"/>
  <path d="M6 20 A11 11 0 0 0 18 26 Q13 25 9 22 Z" fill="#c0c0d0" opacity="0.4"/>
  <!-- Band -->
  <rect x="3" y="14.5" width="26" height="3" fill="#12141d"/>
  <!-- Center button -->
  <circle cx="16" cy="16" r="4.5" fill="#12141d"/>
  <circle cx="16" cy="16" r="3.2" fill="#9090a8"/>
  <circle cx="16" cy="16" r="1.8" fill="#c0c0d0"/>
  <circle cx="14.8" cy="14.8" r="0.6" fill="#e8e8f8" opacity="0.7"/>
</svg>
