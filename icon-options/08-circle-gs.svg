<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Circular badge with GS, gold ring -->
  <rect width="32" height="32" rx="8" fill="#0f1117"/>
  <!-- Gold outer ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#c9a227" stroke-width="2"/>
  <!-- Inner circle -->
  <circle cx="16" cy="16" r="11" fill="#111820"/>
  <!-- GS stacked -->
  <text x="16" y="14" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="9" fill="#c9a227" text-anchor="middle">G</text>
  <text x="16" y="24" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="9" fill="#a8d4e8" text-anchor="middle">S</text>
  <!-- Divider line -->
  <line x1="9" y1="16" x2="23" y2="16" stroke="#c9a227" stroke-width="0.8" opacity="0.6"/>
</svg>
