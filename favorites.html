  <style>
    .fav-header-row{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px}
    .fav-header-row .fav-title{margin:0}
    .fav-view-toggle{display:flex;border:1.5px solid var(--color-border);border-radius:8px;overflow:hidden;flex-shrink:0}
    .fav-view-btn{background:transparent;border:none;padding:7px 10px;cursor:pointer;color:var(--color-text-secondary);display:flex;align-items:center;transition:background .15s,color .15s}
    .fav-view-btn.active{background:var(--color-accent);color:#0f1117}
    .fav-view-btn:hover:not(.active){background:var(--color-border);color:var(--color-text)}
    .fav-table-wrap{overflow-x:auto}
    .fav-table{width:100%;border-collapse:collapse;font-size:.875rem}
    .fav-table th{text-align:left;padding:8px 12px;color:var(--color-text-secondary);font-weight:600;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;border-bottom:1.5px solid var(--color-border);white-space:nowrap}
    .fav-table-row{cursor:pointer;transition:background .1s}
    .fav-table-row:hover{background:rgba(255,255,255,.04)}
    .fav-table td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.05);vertical-align:middle}
    .fav-col-ja{font-weight:500;color:var(--color-text)}
    .fav-col-en{color:var(--color-text-secondary)}
    .fav-col-set{color:var(--color-text-secondary);font-size:.8rem;white-space:nowrap}
    .fav-type-icons{display:flex;gap:3px;align-items:center}
    @media(max-width:600px){.fav-col-hide-mobile{display:none}}
  </style>
