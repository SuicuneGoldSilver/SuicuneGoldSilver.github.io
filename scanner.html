<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カードスキャナー — SuicuneGS</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-3DYGH17Q05"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-3DYGH17Q05');</script>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#09090b">
  <meta name="description" content="カメラでポケカをスキャン。日英カード情報をすぐに確認できます。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg:          #09090b;
      --surface:     #111118;
      --border:      #1e1e2c;
      --text:        #f0f0f5;
      --text-muted:  #8b8fa8;
      --accent:      #a8d4e8;
      --ok:          #5ec97e;
      --font-display: "Bebas Neue", Impact, sans-serif;
      --font-body:    "DM Sans", "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Nav ─────────────────────────────────────────── */
    nav {
      padding: 12px 48px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(168,212,232,0.04) 0%, transparent 100%);
      display: flex;
      align-items: center;
      gap: 32px;
      position: relative;
      flex-shrink: 0;
    }
    .nav-logo {
      font-family: var(--font-display);
      font-size: 1.6rem;
      letter-spacing: 0.06em;
      color: var(--accent);
      text-decoration: none;
    }
    .nav-links { display: flex; align-items: center; gap: 24px; }
    .nav-link {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .nav-link:hover { color: var(--text); }
    .nav-hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      margin-left: auto;
    }
    .nav-hamburger span {
      display: block; width: 22px; height: 2px;
      background: var(--text); border-radius: 2px;
      transition: transform 0.22s ease, opacity 0.22s ease;
    }
    .nav-hamburger.is-open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav-hamburger.is-open span:nth-child(2) { opacity: 0; }
    .nav-hamburger.is-open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .nav-mobile {
      position: absolute; top: 100%; left: 0; right: 0;
      background: var(--surface); border-bottom: 1px solid var(--border);
      flex-direction: column; z-index: 200;
      animation: navSlideDown 0.18s ease;
    }
    @keyframes navSlideDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .nav-mobile-link {
      padding: 14px 24px; font-size: 0.9rem; font-weight: 500;
      color: var(--text-muted); text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: color 0.15s, background 0.15s; display: block;
    }
    .nav-mobile-link:last-child { border-bottom: none; }
    .nav-mobile-link:hover { color: var(--text); background: rgba(255,255,255,0.03); }

    /* ── Scanner layout ───────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      position: relative;
    }

    /* Camera fills all available space */
    .camera-wrap {
      flex: 1;
      position: relative;
      background: #000;
      overflow: hidden;
      min-height: 0;
    }

    #camera {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Scan zone overlay ────────────────────────────── */
    .scan-zone-wrap {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* Four dim panels — top, bottom, left, right of the scan band */
    .dim-top, .dim-bottom, .dim-left, .dim-right {
      position: absolute;
      background: rgba(0,0,0,0.58);
    }
    .dim-top    { top: 0;    left: 0; right: 0;  height: 41%; }
    .dim-bottom { bottom: 0; left: 0; right: 0;  height: 41%; }
    .dim-left   { top: 41%;  left: 0; width: 22%; height: 18%; }
    .dim-right  { top: 41%;  right: 0; width: 22%; height: 18%; }

    /* The scan band: narrow, centered — matches the width of the text strip */
    .scan-zone {
      position: absolute;
      top: 41%; left: 22%; right: 22%;
      height: 18%;
      border: 2px solid var(--accent);
      border-radius: 4px;
    }

    /* Corner accents */
    .scan-zone::before, .scan-zone::after,
    .scan-zone-br::before, .scan-zone-br::after {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      border-color: var(--accent);
      border-style: solid;
    }
    .scan-zone::before { top: -2px; left: -2px;   border-width: 3px 0 0 3px; }
    .scan-zone::after  { top: -2px; right: -2px;  border-width: 3px 3px 0 0; }
    .scan-zone-br::before { bottom: -2px; left: -2px;  border-width: 0 0 3px 3px; }
    .scan-zone-br::after  { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; }

    /* Animated sweep line inside the band */
    .scan-beam {
      position: absolute;
      top: 41%; left: 22%; right: 22%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
    }
    .scan-beam.active {
      opacity: 1;
      animation: beamSweep 1.8s ease-in-out infinite;
    }
    @keyframes beamSweep {
      0%   { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(calc(18vh * 0.9)); opacity: 0.3; }
    }

    /* Instruction label — above the band */
    .scan-label {
      position: absolute;
      top: calc(41% - 40px);
      left: 0; right: 0;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 600;
      color: rgba(255,255,255,0.88);
      text-shadow: 0 1px 6px rgba(0,0,0,1);
      letter-spacing: 0.02em;
      pointer-events: none;
    }

    /* Sub-label below the band */
    .scan-sublabel {
      position: absolute;
      top: calc(59% + 10px);
      left: 0; right: 0;
      text-align: center;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.5);
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
      pointer-events: none;
    }

    /* ── Tap-to-focus ring ────────────────────────────── */
    .focus-ring {
      position: absolute;
      width: 56px; height: 56px;
      border: 2px solid #fff;
      border-radius: 4px;
      transform: translate(-50%, -50%) scale(1.4);
      opacity: 0;
      pointer-events: none;
      z-index: 6;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .focus-ring.show {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }
    .focus-ring.hide {
      transform: translate(-50%, -50%) scale(0.9);
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    /* ── Status bar ───────────────────────────────────── */
    .status-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      padding: 32px 20px 16px;
      pointer-events: none;
    }

    .status-ocr {
      font-family: monospace;
      font-size: 0.72rem;
      color: rgba(168,212,232,0.7);
      text-align: center;
      min-height: 1.2em;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status-msg {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.75);
      text-align: center;
      min-height: 1.2em;
    }
    .status-msg.ok  { color: var(--ok); }
    .status-msg.err { color: #e07070; }

    /* Pulsing dot */
    .pulse-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      margin-right: 6px;
      vertical-align: middle;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50%       { opacity: 1;   transform: scale(1.1); }
    }

    /* ── Init overlay ─────────────────────────────────── */
    .camera-init {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: rgba(0,0,0,0.9);
      color: var(--text);
      text-align: center;
      padding: 32px;
      z-index: 10;
    }
    .init-icon {
      width: 64px; height: 64px;
      background: rgba(168,212,232,0.1);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: var(--accent);
    }
    .init-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      letter-spacing: 0.06em;
    }
    .init-sub {
      font-size: 0.85rem;
      color: var(--text-muted);
      max-width: 300px;
      line-height: 1.65;
    }
    .init-tip {
      font-size: 0.78rem;
      color: rgba(168,212,232,0.6);
      border: 1px solid rgba(168,212,232,0.2);
      border-radius: 8px;
      padding: 10px 16px;
      max-width: 300px;
      line-height: 1.6;
    }
    .init-btn {
      background: var(--accent);
      color: #09090b;
      border: none;
      border-radius: 12px;
      padding: 14px 36px;
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 4px;
    }
    .init-btn:hover { opacity: 0.85; }
    .init-btn:disabled { opacity: 0.5; }
    .init-err {
      font-size: 0.82rem;
      color: #e07070;
      max-width: 300px;
      line-height: 1.6;
      display: none;
    }
    .init-loading {
      font-size: 0.82rem;
      color: var(--text-muted);
      display: none;
    }

    /* ── Result overlay ───────────────────────────────── */
    #result-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.82);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: none;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px 16px 28px;
      gap: 12px;
      z-index: 5;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .result-label {
      font-family: var(--font-display);
      font-size: 1rem;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      text-align: center;
    }

    .result-cards-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 55vh;
      overflow-y: auto;
    }

    .result-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(17,17,24,0.95);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .result-card:hover { border-color: var(--accent); }
    .result-card-img {
      width: 52px; height: 72px;
      border-radius: 5px;
      object-fit: contain;
      background: #000;
      flex-shrink: 0;
    }
    .result-card-info { flex: 1; min-width: 0; }
    .result-name-ja {
      font-weight: 700;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .result-name-en {
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .result-meta {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 3px;
    }
    .result-arrow { color: var(--accent); flex-shrink: 0; opacity: 0.7; }

    .result-again {
      background: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 0.9rem;
      padding: 12px;
      cursor: pointer;
      width: 100%;
      transition: color 0.15s, border-color 0.15s;
    }
    .result-again:hover { color: var(--text); border-color: var(--text-muted); }

    /* Not found state */
    .result-notfound {
      text-align: center;
      padding: 12px 0;
    }
    .result-notfound-title {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .result-notfound-sub {
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 10px;
    }
    .result-raw {
      font-family: monospace;
      font-size: 0.72rem;
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
      padding: 6px 10px;
      color: rgba(168,212,232,0.6);
      word-break: break-all;
      text-align: left;
    }

    @media (min-width: 700px) {
      nav { padding: 14px 48px; }
      .scan-beam { animation-duration: 2.5s; }
    }
    @media (max-width: 700px) {
      nav { padding: 12px 20px; gap: 16px; }
      .nav-links { display: none; }
      .nav-hamburger { display: flex; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">SuicuneGS</a>
    <div class="nav-links">
      <a href="/cardsearch.html" class="nav-link">カード検索</a>
      <a href="/study.html" class="nav-link">カード勉強</a>
      <a href="/favorites.html" class="nav-link">気に入りカード</a>
      <a href="/vocablist.html" class="nav-link">日英単語リスト</a>
    </div>
    <button class="nav-hamburger" id="nav-hamburger" aria-label="メニュー" aria-expanded="false" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-mobile" id="nav-mobile" style="display:none">
      <a href="/cardsearch.html" class="nav-mobile-link">カード検索</a>
      <a href="/study.html" class="nav-mobile-link">カード勉強</a>
      <a href="/favorites.html" class="nav-mobile-link">気に入りカード</a>
      <a href="/vocablist.html" class="nav-mobile-link">日英単語リスト</a>
    </div>
  </nav>

  <main>

    <!-- Camera feed -->
    <div class="camera-wrap" id="camera-wrap">
      <video id="camera" autoplay playsinline muted></video>

      <!-- Tap-to-focus indicator -->
      <div class="focus-ring" id="focus-ring"></div>

      <!-- Scan zone guide -->
      <div class="scan-zone-wrap" id="scan-zone-wrap" style="display:none">
        <div class="dim-top"></div>
        <div class="dim-bottom"></div>
        <div class="dim-left"></div>
        <div class="dim-right"></div>
        <div class="scan-label">カード底部のテキストをここに合わせて近づける</div>
        <div class="scan-zone" id="scan-zone">
          <div class="scan-zone-br"></div>
        </div>
        <div class="scan-beam" id="scan-beam"></div>
        <div class="scan-sublabel">JP・EN 両対応 — セット番号が大きく映るように</div>
      </div>

      <!-- Live status bar (bottom of camera view) -->
      <div class="status-bar" id="status-bar" style="display:none">
        <div class="status-ocr" id="status-ocr"></div>
        <div class="status-msg" id="status-msg">
          <span class="pulse-dot"></span>スキャン中…
        </div>
      </div>

      <!-- Result overlay -->
      <div id="result-overlay">
        <div class="result-label" id="result-label">スキャン結果</div>
        <div class="result-cards-list" id="result-cards-list"></div>
        <button class="result-again" onclick="resumeScanning()">もう一度スキャン</button>
      </div>

      <!-- Init overlay -->
      <div class="camera-init" id="camera-init">
        <div class="init-icon">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </div>
        <div class="init-title">カードスキャナー</div>
        <div class="init-sub">カードの下部に印刷されたセットコード・カード番号をカメラで読み取ります。</div>
        <div class="init-tip">
          📌 カードの<strong>下部テキスト行</strong>（セット番号が印刷されている部分）を<br>
          カメラの中央の枠に合わせて、<strong>近づけてください</strong>。<br>
          カード全体は映らなくて大丈夫です。
        </div>
        <button class="init-btn" id="init-btn" onclick="startScanner()">カメラを起動する</button>
        <div class="init-loading" id="init-loading">OCRモデルを読み込み中…</div>
        <div class="init-err" id="init-err"></div>
      </div>
    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <script>
    // ── Nav ──────────────────────────────────────────────
    function toggleMenu() {
      var btn = document.getElementById('nav-hamburger');
      var menu = document.getElementById('nav-mobile');
      var open = btn.classList.toggle('is-open');
      btn.setAttribute('aria-expanded', open);
      menu.style.display = open ? 'flex' : 'none';
    }
    document.addEventListener('click', function(e) {
      var btn = document.getElementById('nav-hamburger');
      var menu = document.getElementById('nav-mobile');
      if (!document.querySelector('nav').contains(e.target) && btn.classList.contains('is-open')) {
        btn.classList.remove('is-open');
        btn.setAttribute('aria-expanded', 'false');
        menu.style.display = 'none';
      }
    });

    // ── Set code maps ────────────────────────────────────
    const JP_CODES = {
      'M4': 'ns', 'M3': 'nz', 'SV7': 'sm',
    };

    const EN_TO_JP = {
      'cri': ['ns'], 'por': ['nz'], 'pfl': ['ix'],
      'meg': ['ms', 'mb'], 'dri': ['gotr', 'haa'],
      'jt': ['bp'], 'sv8pt5': ['tfex'],
      'sv8': ['seb', 'pd'], 'ssp': ['seb', 'pd'],
      'scr': ['sm'], 'sv7': ['sm'],
      'sf': ['nw', 'mc'], 'twm': ['mc', 'ch'], 'tm': ['mc', 'ch'],
      'tef': ['wf', 'cj'], 'tf': ['wf', 'cj'],
      'sv10': ['md'], 'blk': ['bwbb'], 'wht': ['bwwf'], 'pal': ['pal'],
    };

    // ── Data cache ───────────────────────────────────────
    var dataCache = {};
    function fetchJSON(url) {
      if (dataCache[url]) return Promise.resolve(dataCache[url]);
      return fetch(url).then(function(r) {
        if (!r.ok) throw new Error(url);
        return r.json();
      }).then(function(d) {
        dataCache[url] = d;
        return d;
      });
    }

    // ── OCR worker ───────────────────────────────────────
    var ocrWorker = null;

    async function initOCR() {
      ocrWorker = await Tesseract.createWorker('eng', 1);
      // Primary mode is PSM 7 (single text line) — fast and accurate when the
      // band is tightly cropped. We fall back to PSM 11 (sparse text) in runScan
      // if PSM 7 gets nothing, handling slight misalignment.
      await ocrWorker.setParameters({
        tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789/ ',
        tessedit_pageseg_mode: '7',
      });
    }

    // ── Camera ───────────────────────────────────────────
    var videoStream = null;

    async function startScanner() {
      var btn    = document.getElementById('init-btn');
      var errEl  = document.getElementById('init-err');
      var loadEl = document.getElementById('init-loading');
      btn.disabled = true;
      btn.textContent = '起動中…';
      errEl.style.display = 'none';
      loadEl.style.display = 'block';

      try {
        var [stream] = await Promise.all([
          navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: { ideal: 'environment' },
              width:  { ideal: 1920 },
              height: { ideal: 1080 },
            }
          }),
          initOCR(),
        ]);

        videoStream = stream;
        var video = document.getElementById('camera');
        video.srcObject = stream;
        await video.play();

        document.getElementById('camera-init').style.display = 'none';
        document.getElementById('scan-zone-wrap').style.display = 'block';
        document.getElementById('status-bar').style.display = 'block';

        startScanLoop();

      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'カメラを起動する';
        loadEl.style.display = 'none';
        errEl.style.display = 'block';
        if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
          errEl.textContent = 'カメラのアクセスが拒否されました。ブラウザの設定でカメラを許可してください。';
        } else if (err.name === 'NotFoundError') {
          errEl.textContent = 'カメラが見つかりません。';
        } else {
          errEl.textContent = 'エラー: ' + err.message;
        }
      }
    }

    // ── Preprocessing ────────────────────────────────────
    // Returns two canvases: light-background version and dark-background version.
    // Cards can have white or dark bottom areas so we try both.
    function preprocessFrame(video, zone) {
      var vW = video.videoWidth  || 1280;
      var vH = video.videoHeight || 720;

      // Capture the narrow band, mapped from CSS to video pixels
      var wrapB = document.getElementById('camera-wrap').getBoundingClientRect();
      var zoneB = zone.getBoundingClientRect();

      // Small horizontal padding, generous vertical padding so text isn't clipped
      var hPad = 0;
      var vPad = zoneB.height * 0.15;
      var sx = Math.max(0, (zoneB.left - wrapB.left - hPad) / wrapB.width  * vW);
      var sy = Math.max(0, (zoneB.top  - wrapB.top  - vPad) / wrapB.height * vH);
      var sw = Math.min(vW - sx, (zoneB.width  + hPad * 2) / wrapB.width  * vW);
      var sh = Math.min(vH - sy, (zoneB.height + vPad * 2) / wrapB.height * vH);

      // Upscale 6× — the text is close-up so we want maximum resolution
      var scale = 6;
      var canvas = document.createElement('canvas');
      canvas.width  = sw * scale;
      canvas.height = sh * scale;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);

      // Build two variants: normal threshold + inverted threshold
      var id = ctx.getImageData(0, 0, canvas.width, canvas.height);
      var d  = id.data;
      var normCanvas = document.createElement('canvas');
      var invCanvas  = document.createElement('canvas');
      normCanvas.width = invCanvas.width  = canvas.width;
      normCanvas.height = invCanvas.height = canvas.height;
      var nc = normCanvas.getContext('2d');
      var ic = invCanvas.getContext('2d');
      var nid = nc.createImageData(canvas.width, canvas.height);
      var iid = ic.createImageData(canvas.width, canvas.height);

      for (var i = 0; i < d.length; i += 4) {
        var gray = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
        // Adaptive: threshold at 50% of range (simple local-ish)
        var val  = gray > 128 ? 255 : 0;
        var ival = val === 255 ? 0 : 255;
        nid.data[i] = nid.data[i+1] = nid.data[i+2] = val;  nid.data[i+3] = 255;
        iid.data[i] = iid.data[i+1] = iid.data[i+2] = ival; iid.data[i+3] = 255;
      }
      nc.putImageData(nid, 0, 0);
      ic.putImageData(iid, 0, 0);

      return [normCanvas, invCanvas];
    }

    // ── OCR text parser ──────────────────────────────────
    function parseCardText(raw) {
      var text = raw.toUpperCase().replace(/[^A-Z0-9/]+/g, ' ').replace(/\s+/g, ' ').trim();

      // Must find NNN/NNN pattern
      var numMatch = text.match(/\b(\d{1,3})\s*\/\s*(\d{2,3})\b/);
      if (!numMatch) return null;

      var cardNum   = parseInt(numMatch[1], 10);
      var cardTotal = parseInt(numMatch[2], 10);

      // Sanity check: card number shouldn't exceed total
      if (cardNum > cardTotal + 20) return null;

      var isEN = /\bEN\b/.test(text);

      if (isEN) {
        var enIdx = text.indexOf(' EN ');
        var setCode = '';
        if (enIdx > 0) {
          var before = text.slice(0, enIdx).trim().split(/\s+/);
          setCode = before[before.length - 1].toLowerCase();
        }
        return { type: 'en', setCode: setCode, cardNum: cardNum, cardTotal: cardTotal, raw: text };
      } else {
        var numPos = text.search(/\b\d{1,3}\/\d{2,3}\b/);
        var before  = numPos > 0 ? text.slice(0, numPos).trim() : '';
        var tokens  = before.split(/\s+/).filter(function(t) { return t.length > 0; });
        var setCode = tokens.length >= 1 ? tokens[tokens.length - 1] : '';
        var regMark = tokens.length >= 2 ? tokens[tokens.length - 2] : '';
        return { type: 'jp', setCode: setCode, regMark: regMark, cardNum: cardNum, cardTotal: cardTotal, raw: text };
      }
    }

    // ── Card lookup ──────────────────────────────────────
    async function lookupCards(parsed) {
      if (!parsed) return [];
      var results = [];

      if (parsed.type === 'en') {
        var jpSetIds = EN_TO_JP[parsed.setCode] || [];
        for (var i = 0; i < jpSetIds.length; i++) {
          try {
            var cards = await fetchJSON('/data/cards/' + jpSetIds[i] + '.json');
            var card  = cards.find(function(c) {
              return c.setIdEn && c.setIdEn.toLowerCase() === parsed.setCode &&
                     parseInt(c.numberEn, 10) === parsed.cardNum;
            });
            if (card) results.push(card);
          } catch(e) {}
        }

      } else if (parsed.type === 'jp') {
        var jpSetId = JP_CODES[parsed.setCode];
        if (jpSetId) {
          results = await lookupInSet(jpSetId, parsed.cardNum);
        } else {
          try {
            var sets = await fetchJSON('/data/sets.json');
            var candidates = sets.filter(function(s) {
              return s.language === 'ja' &&
                     s.printedTotal === parsed.cardTotal &&
                     (!parsed.regMark || s.regulationMark === parsed.regMark);
            });
            for (var k = 0; k < candidates.length; k++) {
              var found = await lookupInSet(candidates[k].id, parsed.cardNum);
              results = results.concat(found);
            }
          } catch(e) {}
        }
      }

      return results;
    }

    async function lookupInSet(setId, cardNum) {
      try {
        var cards = await fetchJSON('/data/cards/' + setId + '.json');
        var card  = cards.find(function(c) { return parseInt(c.numberJa, 10) === cardNum; });
        return card ? [card] : [];
      } catch(e) { return []; }
    }

    // ── Tap-to-focus ─────────────────────────────────────
    var focusRingTimer = null;

    document.getElementById('camera-wrap').addEventListener('click', function(e) {
      // Only when camera is live and result overlay is not showing
      if (!videoStream) return;
      var overlay = document.getElementById('result-overlay');
      if (overlay.style.display === 'flex') return;
      tapToFocus(e.clientX, e.clientY);
    });

    function showFocusRing(clientX, clientY) {
      var ring = document.getElementById('focus-ring');
      var wrap = document.getElementById('camera-wrap');
      var rect = wrap.getBoundingClientRect();
      ring.style.left = (clientX - rect.left) + 'px';
      ring.style.top  = (clientY - rect.top)  + 'px';
      ring.className  = 'focus-ring show';
      clearTimeout(focusRingTimer);
      focusRingTimer = setTimeout(function() {
        ring.className = 'focus-ring hide';
      }, 1200);
    }

    async function tapToFocus(clientX, clientY) {
      showFocusRing(clientX, clientY);
      if (!videoStream) return;
      var track = videoStream.getVideoTracks()[0];
      if (!track) return;
      try {
        var wrap = document.getElementById('camera-wrap');
        var rect = wrap.getBoundingClientRect();
        var x = (clientX - rect.left) / rect.width;
        var y = (clientY - rect.top)  / rect.height;
        await track.applyConstraints({
          advanced: [{ focusMode: 'single-shot', pointsOfInterest: [{ x: x, y: y }] }]
        });
      } catch(e) {
        // ImageCapture focus not supported on this device — visual feedback still shown
      }
    }

    // ── Scan loop ─────────────────────────────────────────
    var scanActive    = false;
    var scanRunning   = false;
    var scanLoopTimer = null;
    var lastRawText   = '';

    function startScanLoop() {
      scanActive = true;
      document.getElementById('scan-beam').classList.add('active');
      setStatus('', '<span class="pulse-dot"></span>スキャン中…');
      scheduleScan(300);
    }

    function scheduleScan(delay) {
      clearTimeout(scanLoopTimer);
      if (!scanActive) return;
      scanLoopTimer = setTimeout(runScan, delay);
    }

    async function runScan() {
      if (!scanActive || scanRunning || !ocrWorker) return;
      scanRunning = true;

      var video = document.getElementById('camera');
      var zone  = document.getElementById('scan-zone');

      try {
        var [normCanvas, invCanvas] = preprocessFrame(video, zone);

        // Pass order:
        //   0: PSM 7 (single line) on normal threshold  — fastest, best when aligned
        //   1: PSM 7 on inverted threshold              — catches dark-background cards
        //   2: PSM 11 (sparse text) on normal           — fallback for slight misalignment
        //   3: PSM 11 on inverted                       — last resort
        var parsed  = null;
        var rawText = '';
        var psm7 = '7', psm11 = '11';

        var passes = [
          { canvas: normCanvas, psm: psm7  },
          { canvas: invCanvas,  psm: psm7  },
          { canvas: normCanvas, psm: psm11 },
          { canvas: invCanvas,  psm: psm11 },
        ];

        for (var pass = 0; pass < passes.length; pass++) {
          var p = passes[pass];
          await ocrWorker.setParameters({ tessedit_pageseg_mode: p.psm });
          var dataURL = p.canvas.toDataURL('image/png');
          var result  = await ocrWorker.recognize(dataURL);
          var text    = result.data.text.trim();
          var attempt = parseCardText(text);
          if (attempt) {
            parsed  = attempt;
            rawText = attempt.raw;
            break;
          }
          if (text.replace(/\s/g, '').length > 2) {
            rawText = text.toUpperCase().replace(/[^A-Z0-9/ ]/g, '').replace(/\s+/g, ' ').trim();
          }
        }

        // Always show what we're seeing
        if (rawText && rawText !== lastRawText) {
          lastRawText = rawText;
          document.getElementById('status-ocr').textContent = rawText.slice(0, 60);
        }

        if (parsed) {
          var cards = await lookupCards(parsed);
          if (cards.length > 0) {
            stopScanLoop();
            showResult(cards, parsed);
            return;
          } else {
            // Parsed something but no match — show what we read
            setStatus(
              parsed.raw,
              parsed.type === 'en'
                ? 'ENカード: ' + parsed.setCode.toUpperCase() + ' ' + parsed.cardNum + ' — セット未収録'
                : 'JPカード: ' + parsed.setCode + ' ' + parsed.cardNum + '/' + parsed.cardTotal + ' — 一致なし'
            );
          }
        }

      } catch(e) {
        // ignore OCR errors, keep looping
      }

      scanRunning = false;
      scheduleScan(900);
    }

    function stopScanLoop() {
      scanActive = false;
      scanRunning = false;
      clearTimeout(scanLoopTimer);
      document.getElementById('scan-beam').classList.remove('active');
    }

    function resumeScanning() {
      document.getElementById('result-overlay').style.display = 'none';
      document.getElementById('status-bar').style.display = 'block';
      document.getElementById('scan-zone-wrap').style.display = 'block';
      lastRawText = '';
      setStatus('', '<span class="pulse-dot"></span>スキャン中…');
      startScanLoop();
    }

    function setStatus(ocr, msg) {
      var ocrEl = document.getElementById('status-ocr');
      var msgEl = document.getElementById('status-msg');
      if (ocr !== undefined) ocrEl.textContent = ocr;
      if (msg  !== undefined) msgEl.innerHTML  = msg;
    }

    // ── Render result ─────────────────────────────────────
    async function showResult(cards, parsed) {
      document.getElementById('status-bar').style.display = 'none';
      document.getElementById('scan-zone-wrap').style.display = 'none';

      var label    = document.getElementById('result-label');
      var listEl   = document.getElementById('result-cards-list');
      var overlayEl = document.getElementById('result-overlay');

      if (navigator.vibrate) navigator.vibrate([20, 40, 20]);

      listEl.innerHTML = '';

      if (cards.length === 0) {
        label.textContent = '見つかりませんでした';
        listEl.innerHTML =
          '<div class="result-notfound">' +
          '<div class="result-notfound-title">カードが見つかりませんでした</div>' +
          '<div class="result-notfound-sub">カードをもっと近づけるか、<br>明るい場所で試してください。</div>' +
          (parsed ? '<div class="result-raw">読み取り: ' + escHtml(parsed.raw) + '</div>' : '') +
          '</div>';
      } else {
        label.textContent = cards.length > 1 ? '候補 ' + cards.length + '件' : '認識しました';
        var sets = null;
        try { sets = await fetchJSON('/data/sets.json'); } catch(e) {}

        for (var i = 0; i < cards.length; i++) {
          var card    = cards[i];
          var setName = '';
          if (sets) {
            var setObj = sets.find(function(s) { return s.id === card.setIdJa; });
            if (setObj) setName = setObj.name;
          }
          var a = document.createElement('a');
          a.className = 'result-card';
          a.href = '/cardsearch.html?card=' + encodeURIComponent(card.id);
          a.innerHTML =
            '<img class="result-card-img" src="/' + escHtml(card.imageJa || '') + '" alt="" loading="lazy">' +
            '<div class="result-card-info">' +
              '<div class="result-name-ja">' + escHtml(card.nameJa || '—') + '</div>' +
              '<div class="result-name-en">'  + escHtml(card.nameEn || '')  + '</div>' +
              '<div class="result-meta">' + escHtml(setName || card.setIdJa) + ' · ' + escHtml(card.numberJa || '') + '</div>' +
            '</div>' +
            '<svg class="result-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';
          listEl.appendChild(a);
        }
      }

      overlayEl.style.display = 'flex';
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>

  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
